<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">

    <title>Calculando IVA de un producto</title>
</head>
<body>
    <div class="container">
      <main>
        <section>
          <article>
            <h1>Calcular IVA de un producto y/o Servicio</h1>
            <form>
              <div class="mb-3">
                <label for="precioDeBase" class="form-label">Precio sin IVA</label>
                <input type="number" class="form-control" id="precioDeBase" aria-describedby="1000">
              </div>
              <div class="mb-3">
                <label for="IVA" class="form-label">IVA</label>
                <input type="number" class="form-control" id="IVA" readonly>
              </div>
              <div class="mb-3">
                <label for="precioFinal" class="form-label">Precio Final</label>
                <input type="number" class="form-control" id="precioFinal" readonly>
              </div>
              <div class="mb-3">
              <button type="button" class="btn btn-primary" onclick="calcular()">Calcular</button>
              <button type="reset" class="btn btn-primary">Borrar</button>
              </div>
            </form>
          </article>
        </section>
      </main>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
    <script src="./js/main.js"></script>
</body>
</html>
